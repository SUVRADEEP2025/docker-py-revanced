name: MicroG Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 */3 * *"

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - run: gh release download --repo MorpheApp/MicroG-RE --pattern "*.apk"
      - run: mv *.apk 1microg.apk
      - uses: actions/upload-artifact@main
        with:
          name: microg
          path: 1microg.apk

  release:
    needs: check-update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@main
        with:
          name: microg
      - uses: ./.github/actions/release
        with:
          files: 1microg.apk
