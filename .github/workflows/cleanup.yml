
name: clean artifacts
permissions: write-all
on:
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    name: Clean up old artifacts
    permissions:
      actions: write-all
    steps:
      - name: cleanup
        uses: glassechidna/artifact-cleaner@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          minimumAge: 86400 


