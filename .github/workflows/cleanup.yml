name: Routine Cleanup

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC
  workflow_dispatch:
    inputs:
      retain_days:
        description: 'Days of workflow run history to keep'
        required: false
        default: '7'
      keep_minimum_runs:
        description: 'Minimum number of runs to keep regardless of age'
        required: false
        default: '1'

jobs:
  cleanup-workflow-history:
    name: Clean Workflow Run History
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete old completed/failed workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: ${{ inputs.retain_days || '7' }}
          keep_minimum_runs: ${{ inputs.keep_minimum_runs || '1' }}
          # Targets only runs that have fully completed (success, failure,
          # cancelled, skipped, timed_out) — in-progress and queued runs
          # are left untouched
          delete_workflow_by_state_pattern: "completed"

  cleanup-actions-cache:
    name: Clean Actions Cache
    runs-on: ubuntu-latest
    permissions:
      actions: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Delete all Actions caches
        run: |
          echo "Fetching cache list (all refs)..."
          failed=0

          while true; do
            ids=$(gh cache list \
              --repo "$GITHUB_REPOSITORY" \
              --limit 100 \
              --json id \
              --jq '.[].id')

            [[ -z "$ids" ]] && break

            for id in $ids; do
              if gh cache delete "$id" --repo "$GITHUB_REPOSITORY"; then
                echo "Deleted cache: $id"
              else
                echo "::warning::Failed to delete cache: $id"
                failed=$((failed + 1))
              fi
            done

            [[ $(echo "$ids" | wc -l) -lt 100 ]] && break
          done

          if [[ $failed -gt 0 ]]; then
            echo "::error::$failed cache(s) could not be deleted"
            exit 1
          fi
          echo "Cache cleanup complete."