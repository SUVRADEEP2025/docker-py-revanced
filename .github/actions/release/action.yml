name: Releasing APK files
description: "Releases APK files to GitHub Releases"

inputs:
  changelog-filename:
    description: "Name of the generated changelog file"
    required: false
    default: "CHANGELOG.txt"

outputs:
  changelog-path:
    description: "Absolute path to the generated changelog file"
    value: ${{ steps.generate.outputs.changelog-path }}

runs:
  using: "composite"
  steps:
    - name: Generate release info
      id: generate
      shell: bash
      run: |
        CHANGELOG_PATH="${{ github.workspace }}/${{ inputs.changelog-filename }}"

        cat << 'EOF' > "$CHANGELOG_PATH"
        **This repository is not like any other repository. It does not create new releases; it only releases new files.**
        **Forget about scrolling whole release page find files. Just read [Readme.md](../main/README.md#microg-revanced) file and select apps you want download.**

        **Change log** :point_down:
        [Morphe](https://github.com/MorpheApp/morphe-patches/releases/)
        [Revanced](https://github.com/revanced/revanced-patches/releases)
        [Revanced Extended anddea](https://github.com/anddea/revanced-patches/releases)
        [Twitter Piko](https://github.com/crimera/piko/releases)
        EOF

        echo "changelog-path=$CHANGELOG_PATH" >> "$GITHUB_OUTPUT"