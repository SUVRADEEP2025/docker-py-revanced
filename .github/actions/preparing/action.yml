name: Preparing to patch
description: "Prepares to patch by setting up the environment"
runs:
  using: "composite"
  steps:
    - name: Set up jdk
      uses: actions/setup-java@v5.1.0
      with:
        distribution: 'zulu'
        java-version: '21'
    - name: Setup Cloudflare Warp
      shell: bash
      run: bash src/etc/cf_warp.sh
